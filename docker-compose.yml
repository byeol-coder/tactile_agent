services:
  backend:
    build: ./backend
    environment:
      # Provide a real key to enable the Claude pipeline; omit for mock mode.
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - TGA_MODEL=${TGA_MODEL:-claude-opus-4-8}
      - TGA_ALLOWED_ORIGINS=http://localhost:8080,http://127.0.0.1:8080
    volumes:
      - tga_data:/data
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8080:80"

volumes:
  tga_data:
