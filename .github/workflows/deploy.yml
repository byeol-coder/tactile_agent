name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true        # Pages가 꺼져 있으면 자동으로 켜기
      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          path: .                 # 정적 사이트(루트 전체) 업로드
      - id: deployment
        name: Deploy
        uses: actions/deploy-pages@v4
